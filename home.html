<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Tajii Boutique Admin</title>
  <link rel="stylesheet" href="home.css">
</head>
<body>

  <!-- HEADER -->
  <header>
    <h2>Tajii Boutique</h2>

    <nav id="nav">
      <a href="home.html">Home</a>
      <a href="addproduct.html">Add Products</a>
      <a href="inventory.html">Inventory</a>
      <a href="settings.html">Settings</a>
    </nav>

    <div class="hamburger" id="hamburger">☰</div>
  </header>

  <!-- PRODUCTS -->
  <main>
    <div id="products" class="products"></div>
  </main>

  <!-- EDIT MODAL -->
  <div class="modal" id="modal">
    <div class="modal-content">
      <h3>Edit Product</h3>

      <img id="currentImage" src="" alt="Current Image" style="width:100%; height:200px; object-fit:cover; margin-bottom:10px;">
      <input type="file" id="editImageFile" accept="image/*">
      <input type="number" id="editPrice" placeholder="Price">
      <input type="number" id="editStockCount" placeholder="Stock Count">
      
      <label>
        <input type="checkbox" id="editStock"> In Stock
      </label>

      <button id="saveEdit">Save</button>
      <button onclick="closeModal()">Cancel</button>
    </div>
  </div>

  <script type="module" src="home.js"></script>
</body>
</html>
