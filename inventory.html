<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Inventory - Tajii Boutique</title>
  <link rel="stylesheet" href="inventory.css">
</head>
<body>

  <header>
    <h2>Tajii Boutique</h2>
    <nav id="nav">
      <a href="home.html">Home</a>
      <a href="addproduct.html">Add Products</a>
      <a href="inventory.html">Inventory</a>
      <a href="settings.html">Settings</a>
    </nav>
    <div class="hamburger" id="hamburger">☰</div>
  </header>

  <div class="container">
    <h2>Inventory</h2>
    <div id="totalValue" style="text-align: center; margin-bottom: 20px; font-size: 18px; font-weight: bold; color: #667eea;"></div>
    <table id="inventoryTable">
      <thead>
        <tr>
          <th>Product Name</th>
          <th>Price (KSh)</th>
          <th>Stock Count</th>
        </tr>
      </thead>
      <tbody id="inventoryBody">
        <!-- Products will be injected here -->
      </tbody>
    </table>
  </div>

  <script type="module" src="inventory.js"></script>
  <script>
    // Hamburger menu
    document.getElementById('hamburger').onclick = () => {
      document.getElementById('nav').classList.toggle('active')
    }
  </script>
</body>
</html>
